services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: iandsec-uc-app-dev
    depends_on:
      mysql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-iandsec-user-center}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_mysql_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iandsec-user-center}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_redis_password_change_me}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@admin.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-Admin123456}
      UVICORN_RELOAD: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_DEV_OPEN: "false"
    ports:
      - "9999:9999"
      - "3100:3100"
    volumes:
      - .:/opt/iandsec-uc
      - app_storage:/opt/iandsec-uc/storage
      - app_logs:/opt/iandsec-uc/app/logs
      - web_node_modules:/opt/iandsec-uc/web/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    restart: unless-stopped
    stdin_open: true
    tty: true

  mysql:
    image: mysql:8.0
    container_name: iandsec-uc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev_root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iandsec-user-center}
      MYSQL_USER: ${MYSQL_USER:-iandsec-user-center}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_mysql_password_change_me}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "127.0.0.1:33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mysql-init:
    image: mysql:8.0
    container_name: iandsec-uc-mysql-init
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev_root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iandsec-user-center}
      MYSQL_USER: ${MYSQL_USER:-iandsec-user-center}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev_mysql_password_change_me}
    command:
      - sh
      - -c
      - |
        mysql -h mysql -uroot -p"$${MYSQL_ROOT_PASSWORD}" <<SQL
        CREATE DATABASE IF NOT EXISTS \`$${MYSQL_DATABASE}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
        CREATE USER IF NOT EXISTS '$${MYSQL_USER}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        ALTER USER '$${MYSQL_USER}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        GRANT ALL PRIVILEGES ON \`$${MYSQL_DATABASE}\`.* TO '$${MYSQL_USER}'@'%';
        FLUSH PRIVILEGES;
        SQL
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: iandsec-uc-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_password_change_me}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_redis_password_change_me}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_logs:
  web_node_modules:
  pnpm_store:
